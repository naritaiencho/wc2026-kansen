name: Build Android Debug APK

# 静的WebアプリをCapacitorで包んだAndroid APK(デバッグ版)をクラウドでビルドする。
# ローカルにAndroid SDKを入れずに、ここでAPKを生成→Artifactとしてダウンロードできる。
on:
  workflow_dispatch: {}
  push:
    branches: [master]
    paths:
      - 'android/**'
      - 'capacitor.config.ts'
      - 'src/**'
      - 'public/**'
      - '.github/workflows/android-debug.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      # ubuntu-latest はAndroid SDK同梱(ANDROID_HOME設定済・ライセンス受諾済)。
      # 念のためのセーフティネット(platform 36 等の保証)。
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Capacitor sync (copy dist/ + plugins into android/)
        run: npx cap sync android

      # Windowsでスキャフォールドした gradlew は実行ビットが落ちている場合があるため付与
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wc2026-techo-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
