name: Build & Release Signed APK

# 配布用の「署名済みリリースAPK」をビルドする。
# 同じ署名キー(Secret管理)を毎回使うので、ユーザーは"上書き更新"でき、保存データが消えない。
# タグ(v*)をpushすると、署名済みAPKをビルドして GitHub Release を自動作成・添付する。
# 手動(workflow_dispatch)でも実行可(その場合はArtifactのみ)。
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Capacitor sync (copy dist/ + plugins into android/)
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # Secretのbase64から署名キーストアを復元(リポジトリには置かない)
      - name: Restore keystore from secret
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/wc2026.keystore"

      - name: Build signed release APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/wc2026.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wc2026-techo-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      # タグpush時のみ GitHub Release を作成して署名済みAPKを添付
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          name: ワールドカップ手帳 '26 ${{ github.ref_name }}
          body: |
            Android向け「ワールドカップ手帳 '26」配布用APK(署名済み)。

            ## 入れ方
            1. スマホで下の `app-release.apk` をタップしてダウンロード
            2. 「提供元不明のアプリ」のインストールを許可
            3. インストール → ホームに「ワールドカップ手帳」が追加されます

            ※ Android専用 / 起動にはネット接続が必要です。
